<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위드 | 진짜 세상에서의 즐거움</title>

    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>

    <style>
        /* =========================================
           CSS 스타일 (원본 유지 및 새 버튼 추가)
        ========================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            height: 100vh; 
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        .main-wrapper {
            position: relative;
            width: 100%;
            max-width: 1920px;
            height: 100%;
            max-height: 1080px;
            background-image: url('1.jpg'); 
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.3);
            z-index: 1;
        }

        .back-icon {
            position: absolute; top: 3%; left: 3%;
            font-size: 2.5rem; color: white; text-decoration: none; z-index: 20;
        }

        .login-container { 
            text-align: center; color: white; 
            width: 80%; 
            max-width: 400px; 
            padding: 20px; 
            z-index: 10; 
            font-size: calc(14px + 0.5vw); 
        }

        .brand-name { 
            font-family: 'Nanum Myeongjo', serif; 
            font-size: calc(2.5rem + 1vw); 
            margin-bottom: 4%; 
            letter-spacing: -1.5px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .brand-name span { font-size: 0.5em; vertical-align: super; margin-left: 5px; }

        .slogan { 
            font-size: 1em; 
            line-height: 1.6; 
            opacity: 0.95; 
            margin-bottom: 15%; 
            font-weight: 300;
            word-break: keep-all;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .login-actions { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px; 
        }

        .tooltip {
            background: white; color: #333; 
            padding: 8px 20px; border-radius: 25px;
            font-size: 0.85em; font-weight: 800; margin-bottom: 2%;
            position: relative; animation: bounce 2s infinite;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-kakao {
            width: 100%; 
            max-width: 320px; 
            height: calc(45px + 1vh); 
            background-color: #FEE500; border: none; border-radius: 8px;
            font-size: 0.95em; font-weight: 700; color: #3c1e1e; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .google-btn-wrapper { 
            width: 100%; 
            max-width: 320px; 
            height: calc(45px + 1vh); 
            border-radius: 8px; overflow: hidden;
            display: flex; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* ----- 새 버튼 스타일 (텍스트 잘림 방지 포함) ----- */
        .btn-common {
            width: 100%;
            max-width: 320px;
            min-height: 50px; 
            height: auto;    
            padding: 12px 20px; 
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            word-break: keep-all; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-guest {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }

        .btn-event {
            background: linear-gradient(45deg, #ff4e50, #f9d423); 
            color: #333;
            margin-top: 5px;
            line-height: 1.4;
            flex-direction: column; 
        }

        .btn-event span {
            font-size: 0.75em;
            font-weight: 400;
        }

        .login-footer { 
            margin-top: 15%; 
            font-size: 0.8em; 
            color: rgba(255,255,255,0.8); 
            line-height: 1.5;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        .login-footer a { color: #fff; text-decoration: underline; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-8px);}
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <a href="javascript:history.back()" class="back-icon">&#x2039;</a>

        <div class="login-container">
            <header class="login-header">
                <h1 class="brand-name">위드<span>✦</span></h1>
                <p class="slogan">디지털 세상에서 벗어나,<br>진짜 세상에서 즐거움 찾기</p>
            </header>

            <div class="login-actions">
                <div class="tooltip">3초 만에 가입하기</div>
                
                <button class="btn-kakao" onclick="loginWithKakao()">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="#3c1e1e"><path d="M9 1C4.58 1 1 3.82 1 7.32c0 2.27 1.5 4.27 3.75 5.37l-.95 3.49c-.06.22.18.41.37.28l4.1-2.71c.24.02.48.04.73.04 4.42 0 8-2.82 8-6.32S13.42 1 9 1z"/></svg>
                    카카오로 시작하기
                </button>

                <div class="google-btn-wrapper">
                    <div id="g_id_onload"
                         data-client_id="648263544979-3t45gm03pirgsme7it19u6kaqacm2966.apps.googleusercontent.com"
                         data-callback="handleGoogleLogin"
                         data-ux_mode="popup">
                    </div>
                    <div class="g_id_signin" data-type="standard" data-size="large" data-width="320" data-theme="outline"></div>
                </div>

              <button class="btn-common btn-guest" onclick="enterAsGuest()">
    게스트로 구경하기
</button>

<script>
    // 게스트 전용 입장 함수 추가
    function enterAsGuest() {
        // 2페.html이 검사하는 'isLoggedIn' 항목을 강제로 true로 설정
        sessionStorage.setItem("isLoggedIn", "true"); 
        location.href = '2페.html';
    }
</script>

                <button class="btn-common btn-event" onclick="sendEventSMS()">
                    🎁10초 이벤트 참여하고 경품받기!🎁
                    <span>(아메리카노, 아이패드, 애플워치 등 증정)</span>
                </button>
            </div>

            <footer class="login-footer">
                로그인 시 <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에<br>동의하게 됩니다.
            </footer>
        </div>
    </div>

 <script>
    window.onload = function() {
        if (typeof Kakao !== 'undefined') {
            if (!Kakao.isInitialized()) {
                Kakao.init('9f7905aa8875eb393a9f737aef3530f2');
                console.log("카카오 SDK v2 초기화 완료");
            }
        }
    };

    function loginWithKakao() {
        if (typeof Kakao === 'undefined') {
            alert("카카오 기능을 불러오는 중입니다.");
            return;
        }
        try {
            Kakao.Auth.authorize({
                redirectUri: 'https://qpdkdqldl123-ops.github.io/with/index.html'
            });
        } catch (e) {
            console.error("실행 에러:", e);
            alert("로그인 실행 중 오류가 발생했습니다.");
        }
    }

    function handleGoogleLogin(response) {
        handleSuccess("구글");
    }

    function handleSuccess(platform) {
        alert(platform + " 계정 인증 완료!");
        sessionStorage.setItem("isLoggedIn", "true");
        window.location.href = "2페.html"; 
    }

    // SMS 발송 함수 (시우님 요청 양식 적용)
    function sendEventSMS() {
        const phoneNumber = "010219135942"; 
        
        const message = `위드 [WITH] 친구 취향 설문 ☕️

1. 내 주변에 있는 친구 수 (베프 기준): 

2. 어떤 사람을 사귀고 싶나요? (취향/성격): 

📌 완료 시 랜덤 100명 '스타벅스 아메리카노' 증정! 🎁
-----------------------------------------
⚡️ 위드 무료 참여 체험단 모집 ⚡️
(지역별 선착순 15명 마감 임박!)

- 신청 양식 -
> 이름: 
> 지역: 
> 나이: 
> MBTI: 
> 가능 날짜: 

✨ 참여 시 추첨 경품 ✨
[갤럭시북 / 애플워치 / 스탠바이미 / 아이패드] 등 25명 추첨! 📱⌚️`;

        const encodedMessage = encodeURIComponent(message);
        const smsUrl = /iPhone|iPad|iPod/i.test(navigator.userAgent) 
            ? `sms:${phoneNumber}&body=${encodedMessage}` 
            : `sms:${phoneNumber}?body=${encodedMessage}`;

        location.href = smsUrl;
    }

    if (location.href.includes('code=')) {
        handleSuccess("카카오");
    }
</script>
</body>
</html>
