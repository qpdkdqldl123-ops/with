<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동행 | 진짜 세상에서의 즐거움</title>

    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>

    <style>
        /* =========================================
           CSS 스타일 (원본 비율 유지 및 반응형)
        ========================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* 전체 화면 설정 (여백은 검은색) */
        body { 
            font-family: 'Pretendard', sans-serif; 
            height: 100vh; 
            background-color: #000; /* 사진 주변 여백 색상 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        /* [핵심] 사진 원본 비율을 유지하는 컨테이너 */
        .main-wrapper {
            position: relative;
            width: 100%;
            max-width: 1920px; /* 원본 사진의 최대 가로폭 (예시) */
            height: 100%;
            max-height: 1080px; /* 원본 사진의 최대 세로폭 (예시) */
            background-image: url('1.jpg'); /* 사진 파일명 */
            
            /* [중요] 원본 비율 유지 속성 */
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 사진 위에 살짝 어두운 막을 씌워 글씨 가독성 확보 */
        .main-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.3); /* 어두움 정도 조절 */
            z-index: 1;
        }

        /* 뒤로가기 아이콘 */
        .back-icon {
            position: absolute; top: 3%; left: 3%;
            font-size: 2.5rem; color: white; text-decoration: none; z-index: 20;
        }

        /* 콘텐츠 컨테이너 (반응형 크기 조절) */
        .login-container { 
            text-align: center; color: white; 
            width: 80%; /* 화면 너비에 따라 유동적으로 조절 */
            max-width: 400px; /* 너무 커지지 않게 제한 */
            padding: 20px; 
            z-index: 10; 
            /* 화면이 작아지면 글씨 크기도 같이 줄어들게 설정 (vw 단위 사용) */
            font-size: calc(14px + 0.5vw); 
        }

        /* 브랜드명: 동행 (반응형 크기) */
        .brand-name { 
            font-family: 'Nanum Myeongjo', serif; 
            font-size: calc(2.5rem + 1vw); /* 화면 크기에 비례해 축소 */
            margin-bottom: 4%; 
            letter-spacing: -1.5px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .brand-name span { font-size: 0.5em; vertical-align: super; margin-left: 5px; }

        /* 슬로건 (반응형 크기) */
        .slogan { 
            font-size: 1em; 
            line-height: 1.6; 
            opacity: 0.95; 
            margin-bottom: 15%; 
            font-weight: 300;
            word-break: keep-all;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        /* 로그인 버튼 영역 */
        .login-actions { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px; 
        }

        /* 3초 만에 가입하기 툴팁 */
        .tooltip {
            background: white; color: #333; 
            padding: 8px 20px; border-radius: 25px;
            font-size: 0.85em; font-weight: 800; margin-bottom: 2%;
            position: relative; animation: bounce 2s infinite;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .tooltip::after {
            content: ''; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
            border-left: 7px solid transparent; border-right: 7px solid transparent; border-top: 7px solid white;
        }

        /* 카카오 버튼 디자인 (반응형 크기) */
        .btn-kakao {
            width: 100%; /* 부모 컨테이너에 맞춤 */
            max-width: 320px; /* 너무 커지지 않게 제한 */
            height: calc(45px + 1vh); /* 화면 높이에 비례해 축소 */
            background-color: #FEE500; border: none; border-radius: 8px;
            font-size: 0.95em; font-weight: 700; color: #3c1e1e; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* 구글 버튼 래퍼 (반응형 크기) */
        .google-btn-wrapper { 
            width: 100%; 
            max-width: 320px; 
            height: calc(45px + 1vh); 
            border-radius: 8px; overflow: hidden;
            display: flex; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* 하단 약관 (반응형 크기) */
        .login-footer { 
            margin-top: 15%; 
            font-size: 0.8em; 
            color: rgba(255,255,255,0.8); 
            line-height: 1.5;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        .login-footer a { color: #fff; text-decoration: underline; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-8px);}
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <a href="javascript:history.back()" class="back-icon">&#x2039;</a>

        <div class="login-container">
            <header class="login-header">
                <h1 class="brand-name">동행<span>✦</span></h1>
                <p class="slogan">디지털 세상에서 벗어나,<br>진짜 세상에서 즐거움 찾기</p>
            </header>

            <div class="login-actions">
                <div class="tooltip">3초 만에 가입하기</div>
                
                <button class="btn-kakao" onclick="loginWithKakao()">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="#3c1e1e"><path d="M9 1C4.58 1 1 3.82 1 7.32c0 2.27 1.5 4.27 3.75 5.37l-.95 3.49c-.06.22.18.41.37.28l4.1-2.71c.24.02.48.04.73.04 4.42 0 8-2.82 8-6.32S13.42 1 9 1z"/></svg>
                    카카오로 시작하기
                </button>

                <div class="google-btn-wrapper">
                    <div id="g_id_onload"
                         data-client_id="648263544979-3t45gm03pirgsme7it19u6kaqacm2966.apps.googleusercontent.com"
                         data-callback="handleGoogleLogin"
                         data-ux_mode="popup">
                    </div>
                    <div class="g_id_signin" data-type="standard" data-size="large" data-width="calc(80vw)" data-theme="outline"></div>
                </div>
            </div>

            <footer class="login-footer">
                로그인 시 <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에<br>동의하게 됩니다.
            </footer>
        </div>
    </div>

  <script>
        /* =========================================
           자바스크립트 수정 (안정성 강화)
        ========================================= */

        // 1. 카카오 초기화 (중복 초기화 방지)
        if (!Kakao.isInitialized()) {
            Kakao.init('9f7905aa8875eb393a9f737aef3530f2'); 
        }

        // 2. 카카오 로그인 함수
        function loginWithKakao() {
            try {
                // 최신 SDK에서는 authorize 방식을 권장합니다.
                // 팝업 방식이 차단되는 환경이 많으므로 아래와 같이 시도해보세요.
                Kakao.Auth.login({
                    success: function(authObj) {
                        console.log('카카오 로그인 성공:', authObj);
                        handleSuccess("카카오");
                    },
                    fail: function(err) {
                        console.error('카카오 로그인 실패:', err);
                        alert("로그인에 실패했습니다. 설정을 확인해주세요.");
                    },
                });
            } catch (e) {
                console.error("카카오 로그인 실행 중 오류 발생:", e);
                alert("카카오 SDK가 아직 로드되지 않았거나 설정이 잘못되었습니다.");
            }
        }

        // 3. 구글 로그인 콜백
        function handleGoogleLogin(response) {
            handleSuccess("구글");
        }

        // 4. 성공 시 처리 및 페이지 이동
        function handleSuccess(platform) {
            alert(platform + " 계정 인증 완료! 메인 화면으로 이동합니다.");

            // 세션 스토리지에 로그인 상태 저장
            sessionStorage.setItem("isLoggedIn", "true");

            // 페이지 이동 (2페.html 파일이 같은 폴더에 있어야 합니다)
            window.location.href = "2페.html"; 
        }
    </script>
</body>
</html>
